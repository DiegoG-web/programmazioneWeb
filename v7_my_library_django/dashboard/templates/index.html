{% extends 'layouts/app.html' %}
{% load static %}
{% block content %}
    <div class="container">
        <h1 class="mt-3">
            Questa è la mia libreria e contiene {{ count_books }} libri e {{ count_authors }} autori
        </h1>
        <hr class="border border-primary border-1 opacity-75" />
        <div class="row">
            <div class="col-xs-12 col-md-4 p-2">
                <img class="img-responsive img-home" src="{% static 'images/library.jpg' %}" alt="libreria"/>
            </div>
        </div>
    </div>
{% endblock %}
