{% extends 'layouts/app.html' %}

{% block content %}
    <div class="container">
        <h1 class="mt-3">Login</h1>
        <hr class="border border-primary border-1 opacity-75" />
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">
                Login
            </button>
        </form>
    </div>
{% endblock %}
